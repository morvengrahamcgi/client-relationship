<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Relationship Snapshot</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <header class="top-nav">
        <div class="top-nav-left">
          <button class="icon-button nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="true" data-nav-toggle>
            <svg class="icon icon-menu-open" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h12M4 18h16"></path>
              <path d="m18 9 3 3-3 3"></path>
            </svg>
            <svg class="icon icon-menu" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
          <svg class="cgi-logo" viewBox="0 0 132 62" role="img" aria-label="CGI">
            <text x="8" y="45" class="cgi-logo-text">CGI</text>
          </svg>
          <span class="top-nav-divider" aria-hidden="true"></span>
          <div class="top-nav-title">Relationship Snapshot</div>
        </div>
        <div class="top-nav-right">
          <button class="icon-button" type="button" aria-label="Notifications">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path>
              <path d="M13.7 21a2 2 0 0 1-3.4 0"></path>
            </svg>
          </button>
          <button class="profile-button" type="button">MG</button>
        </div>
      </header>

      <div class="shell-body">
        <aside class="side-nav" aria-label="Main navigation">
          <nav>
            <a class="side-nav-link" href="#/" data-nav-link="/">Home</a>
            <a class="side-nav-link" href="#/assessments" data-nav-link="/assessments">Assessments</a>
            <a class="side-nav-link" href="#/clients" data-nav-link="/clients">Clients</a>
            <a class="side-nav-link" href="#/metric-guide" data-nav-link="/metric-guide">Metric Guide</a>
          </nav>
        </aside>
        <button class="mobile-scrim" type="button" aria-label="Close navigation" data-nav-close></button>

        <main class="main-content" role="main">
          <div class="content-header">
            <div class="breadcrumbs" id="breadcrumbs"></div>
            <div class="header-action" id="headerAction"></div>
          </div>
          <div class="content-container" id="view"></div>
        </main>
      </div>

      <div class="drawer-scrim" id="drawerScrim" data-drawer-close></div>
      <aside class="support-drawer" id="supportDrawer" aria-label="Support action drawer" aria-hidden="true"></aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
